name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install package and dev dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=contextpilot --cov-report=term-missing
